<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>TikTok Authorization — Kavomaz Life</title>
  <style>
    body{font-family:Arial,sans-serif;max-width:760px;margin:60px auto;padding:24px;line-height:1.6}
    .box{border:1px solid #ddd;border-radius:14px;padding:24px}
    code{display:block;word-break:break-all;background:#f5f5f5;padding:14px;border-radius:8px}
  </style>
</head>
<body>
  <div class="box">
    <h1>TikTok authorization received</h1>
    <p>Return to the KAI-OS terminal and continue the authorization process.</p>
    <p><strong>Authorization code:</strong></p>
    <code id="code">Waiting for authorization…</code>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    document.getElementById("code").textContent =
      params.get("code") ||
      params.get("error_description") ||
      params.get("error") ||
      "No authorization code was received.";
  </script>
</body>
</html>
